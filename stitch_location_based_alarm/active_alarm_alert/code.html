<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Alarm Triggered - Vigilant Path</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed": "#ffdfa0",
              "surface-container-highest": "#e1e2ec",
              "secondary": "#a43c12",
              "on-tertiary-container": "#ffd274",
              "outline-variant": "#c3c6d6",
              "surface-dim": "#d9d9e4",
              "primary-fixed": "#dae2ff",
              "on-error": "#ffffff",
              "surface-container": "#ededf8",
              "on-error-container": "#93000a",
              "surface": "#faf8ff",
              "error": "#ba1a1a",
              "inverse-surface": "#2e3038",
              "outline": "#737785",
              "on-primary-container": "#ccd8ff",
              "on-background": "#191b23",
              "inverse-primary": "#b2c5ff",
              "on-primary-fixed-variant": "#0040a1",
              "on-secondary-fixed": "#380c00",
              "tertiary": "#5b4300",
              "surface-container-high": "#e7e7f2",
              "surface-variant": "#e1e2ec",
              "error-container": "#ffdad6",
              "on-surface": "#191b23",
              "primary-fixed-dim": "#b2c5ff",
              "on-primary": "#ffffff",
              "on-tertiary": "#ffffff",
              "secondary-container": "#fe7e4f",
              "on-secondary-container": "#6b1f00",
              "surface-container-low": "#f2f3fe",
              "surface-container-lowest": "#ffffff",
              "primary": "#0040a1",
              "on-secondary": "#ffffff",
              "surface-bright": "#faf8ff",
              "surface-tint": "#0056d2",
              "inverse-on-surface": "#f0f0fb",
              "secondary-fixed-dim": "#ffb59c",
              "tertiary-fixed-dim": "#fbbc00",
              "background": "#faf8ff",
              "primary-container": "#0056d2",
              "on-tertiary-fixed-variant": "#5c4300",
              "tertiary-container": "#795900",
              "on-secondary-fixed-variant": "#822800",
              "secondary-fixed": "#ffdbcf",
              "on-tertiary-fixed": "#261a00",
              "on-primary-fixed": "#001847",
              "on-surface-variant": "#424654"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-urgent-gradient {
            background: linear-gradient(135deg, #a43c12 0%, #fe7e4f 100%);
        }
        .glass-overlay {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .pulse-animation {
            box-shadow: 0 0 0 0 rgba(254, 126, 79, 0.7);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(254, 126, 79, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 30px rgba(254, 126, 79, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(254, 126, 79, 0); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body overflow-hidden">
<!-- High Urgency Trigger Screen -->
<main class="relative h-screen w-full flex flex-col items-center justify-between overflow-hidden">
<!-- Background Map Layer (Blurred for focus) -->
<div class="absolute inset-0 z-0 scale-110 blur-md grayscale-[0.2]">
<img class="w-full h-full object-cover" data-alt="Blurred street map showing destination area" data-location="San Francisco City Center" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB8GViGdN7ANwClAQTjclbyBWHU6CW7yx3K3pBZBY2cR_F6cXTcIxgMn7oQvaEEbGeDGj0nZm9nlmxEp-i8-iHhMwPsfj6q-ZEHAG-KuBcFtdVROeq1hTEbYd0SFGbf5sC7kis7zGc5yk9OpjMOI36iOrtHFI5b9X4fvDpuKgcjGgQlozzO9IABMLs3yRsQD-xRXN6OJ04iS5MHonO1_cQKB8pdS2405oNuK_D4cwewZPDvFjx4eOh7TJiMYjWdVuTEGsi-_bOPa2c"/>
</div>
<!-- High-Contrast Urgent Overlay -->
<div class="absolute inset-0 z-10 bg-urgent-gradient opacity-85"></div>
<!-- Content Shell -->
<div class="relative z-20 flex flex-col items-center justify-center w-full h-full px-8 py-16 text-center">
<!-- Top Logo/Indicator -->
<div class="mb-8 opacity-90">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-secondary text-3xl" data-icon="notifications_active" style="font-variation-settings: 'FILL' 1;">notifications_active</span>
<span class="font-headline font-extrabold text-on-secondary text-xl tracking-tight">Vigilant Path</span>
</div>
</div>
<!-- Main Alarm Card (Bento Style/Glass) -->
<div class="glass-overlay w-full max-w-md rounded-[32px] p-8 mb-12 flex flex-col items-center border border-white/20 shadow-2xl">
<!-- Destination Icon Pulse -->
<div class="w-24 h-24 bg-surface-container-lowest rounded-full flex items-center justify-center mb-8 pulse-animation">
<span class="material-symbols-outlined text-secondary text-5xl" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div class="space-y-2">
<p class="font-label font-semibold text-on-secondary/80 uppercase tracking-widest text-xs">Arrived at Destination</p>
<h1 class="font-headline font-black text-on-secondary text-4xl md:text-5xl tracking-tighter leading-tight">Arrived at Work!</h1>
<div class="flex items-center justify-center gap-2 pt-2">
<span class="material-symbols-outlined text-on-secondary/70 text-sm" data-icon="schedule">schedule</span>
<span class="font-label font-medium text-on-secondary/70 text-sm">Triggered at 08:45 AM</span>
</div>
</div>
<!-- Proximity Info -->
<div class="mt-8 bg-black/10 rounded-2xl px-6 py-4 w-full flex items-center justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-secondary" data-icon="straighten">straighten</span>
<span class="text-on-secondary font-medium">Within 100m</span>
</div>
<div class="h-1 w-12 bg-on-secondary/30 rounded-full overflow-hidden">
<div class="h-full w-full bg-on-secondary"></div>
</div>
</div>
</div>
<!-- Action Buttons Area -->
<div class="w-full max-w-md space-y-4">
<!-- Prominent Dismiss Button -->
<button class="w-full h-20 bg-surface-container-lowest text-secondary rounded-full flex items-center justify-center gap-3 shadow-xl active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-3xl font-bold" data-icon="close">close</span>
<span class="font-headline font-extrabold text-xl">Dismiss Alarm</span>
</button>
<!-- Secondary Navigation Button -->
<button class="w-full h-16 bg-transparent border-2 border-on-secondary/30 text-on-secondary rounded-full flex items-center justify-center gap-3 active:scale-95 transition-transform duration-200 backdrop-blur-sm">
<span class="material-symbols-outlined" data-icon="directions">directions</span>
<span class="font-label font-bold">Open Navigation</span>
</button>
</div>
<!-- Lower Detail -->
<div class="mt-12 flex flex-col items-center gap-2 opacity-60">
<span class="material-symbols-outlined text-on-secondary" data-icon="vibration">vibration</span>
<p class="text-on-secondary text-xs font-label">Vibrating &amp; Audio Active</p>
</div>
</div>
<!-- Decorative Asymmetric Accent -->
<div class="absolute -bottom-24 -left-24 w-64 h-64 bg-secondary rounded-full blur-[80px] opacity-40 mix-blend-screen z-10"></div>
<div class="absolute -top-24 -right-24 w-96 h-96 bg-primary rounded-full blur-[100px] opacity-30 mix-blend-overlay z-10"></div>
</main>
<!-- Suppressed Nav Shell for Task Focus (Hidden per logic) -->
<!-- Navigation is excluded to prioritize the focus journey of an active alarm trigger -->
</body></html>
